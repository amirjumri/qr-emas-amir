<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Emas Amir • Link Agen</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         background:#f9fafb;color:#111827;margin:0;}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{background:#fff;border-radius:16px;padding:24px 28px;
          box-shadow:0 10px 30px rgba(15,23,42,0.12);max-width:420px;width:100%;}
    h1{font-size:20px;margin:0 0 4px;}
    p{margin:0 0 10px;font-size:14px;color:#4b5563;}
    .small{font-size:12px;color:#6b7280;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Sedang menghubungkan…</h1>
    <p>Sila tunggu seketika, kami sedang membawa anda ke laman utama Emas Amir.</p>
    <p class="small" id="ref-info"></p>
  </div>
</div>

<script>
  (function(){
    const STORAGE_KEY = "emasamir_agent_ref";

    function setRef(ref){
      if (!ref) return;
      try{
        localStorage.setItem(STORAGE_KEY, ref);
      }catch(e){
        console.warn("Tak boleh simpan ref agen:", e);
      }
    }

    // Dapatkan slug selepas /a/
    const path = window.location.pathname || "";
    // contoh path: /a/x8p2k9 -> parts = ["","a","x8p2k9"]
    const parts = path.split("/").filter(Boolean);
    let slug = null;
    if (parts.length >= 2 && parts[0] === "a"){
      slug = parts[1];
    }

    if (slug){
      setRef(slug);
      const infoEl = document.getElementById("ref-info");
      if (infoEl){
        infoEl.textContent = "Kod rujukan: " + slug;
      }
    }

    // Lepas 800ms, redirect ke laman utama
    setTimeout(function(){
      // kalau sistem tuan guna index.html sebagai landing:
      window.location.href = "/index.html";
      // kalau di production dah guna root / je, boleh tukar kepada:
      // window.location.href = "/";
    }, 800);
  })();
</script>
</body>
</html>
