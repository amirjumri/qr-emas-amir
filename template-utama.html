<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Template — Emas Amir</title>
<meta name="robots" content="noindex">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body{background:#fff}
  .container-narrow{max-width:900px}
  .top-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
  .btn-chip{border-radius:999px}
  .auth-pill{border:1px solid #e5e7eb;border-radius:999px;padding:.2rem .6rem;background:#fafafa;color:#555}
</style>
</head>
<body>
<div class="container container-narrow py-3">

  <!-- TOP BAR -->
  <div class="d-flex justify-content-between align-items-center mb-2">
    <div class="small auth-pill" id="authStatus">Memuatkan…</div>
    <div class="top-actions">
      <a class="btn btn-outline-secondary btn-chip" href="index.html">Halaman Utama</a>
      <a class="btn btn-outline-secondary btn-chip" href="tabung.html">Tabung</a>
      <a class="btn btn-outline-secondary btn-chip" href="goldbar-coin.html">GoldBar/Coin Fizikal</a>
      <a class="btn btn-outline-secondary btn-chip" href="account.html">Akaun</a>
      <button id="btnLogin"  class="btn btn-outline-secondary btn-chip" type="button">Log masuk</button>
      <button id="btnLogout" class="btn btn-outline-secondary btn-chip" type="button" style="display:none">Log keluar</button>
    </div>
  </div>
  <hr class="mb-3">

  <!-- KANDUNGAN KOSONG -->
  <div id="pageContent" class="py-5 text-center text-muted">
    (Tiada kandungan, template kosong)
  </div>

</div>

<!-- Supabase auth helpers -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js?v=13.1"></script>

<script>
  // Status login konsisten (guna auth.js)
  (function(){
    const status = document.getElementById('authStatus');
    const btnLogin = document.getElementById('btnLogin');
    const btnLogout = document.getElementById('btnLogout');

    try{
      const a = (window.auth_get && window.auth_get()) || null;
      if(a){
        status.textContent = 'Log masuk sebagai ' + (a.name || a.phone || 'pengguna');
        btnLogin.style.display = 'none';
        btnLogout.style.display = '';
        btnLogout.onclick = ()=>{ window.auth_clear && window.auth_clear(); location.reload(); };
      }else{
        status.textContent = 'Tidak log masuk';
        btnLogin.style.display = '';
        btnLogout.style.display = 'none';
        btnLogin.onclick = ()=> location.href='login.html#login';
      }
    }catch(e){
      status.textContent = 'Tidak log masuk';
      btnLogin.style.display = '';
      btnLogout.style.display = 'none';
    }
  })();
</script>
</body>
</html>
