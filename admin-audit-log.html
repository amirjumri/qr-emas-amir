<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="/global.css">
  <title>Admin • Audit Log — Emas Amir</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js?v=13.1"></script>
  <script src="admin-guard.js?v=1"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{background:#fff}
    .container-narrow{max-width:1200px}
    .auth-pill{border:1px solid #e5e7eb;border-radius:999px;padding:.2rem .6rem;background:#fafafa;color:#555}
    .btn-chip{border:1px solid #e5e7eb;background:#f8fafc;padding:6px 10px;border-radius:999px;font-size:.9rem}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    .table-sticky thead th{position:sticky;top:0;background:#fff;z-index:5}
    .small-note{font-size:12px;color:#6b7280}
    pre{white-space:pre-wrap;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:10px;font-size:12px;max-height:520px;overflow:auto}
  </style>
</head>

<body>
<div class="container container-narrow py-3">

  <div class="d-flex justify-content-between align-items-center mb-2">
    <div class="small auth-pill" id="authStatus">Memuatkan…</div>
    <div class="d-flex flex-wrap gap-2">
      <a class="btn btn-outline-secondary btn-chip" href="index.html">Halaman Utama</a>
      <a class="btn btn-outline-secondary btn-chip" href="admin.html">Admin</a>
      <a class="btn btn-outline-secondary btn-chip" href="admin-j999.html">Admin 999</a>
      <a class="btn btn-outline-secondary btn-chip" href="admin-j916.html">Admin 916</a>
      <a class="btn btn-outline-secondary btn-chip" href="adminstok-j916.html">Admin Stok 916</a>
      <a class="btn btn-outline-secondary btn-chip" href="admintabung-simpan.html">Admin Tabung</a>
      <a class="btn btn-outline-secondary btn-chip" href="account.html">Akaun</a>
      <button id="btnLogin" class="btn btn-outline-secondary btn-chip" type="button">Log masuk</button>
      <button id="btnLogout" class="btn btn-outline-secondary btn-chip" type="button" style="display:none">Log keluar</button>
    </div>
  </div>

  <hr class="mb-3">

  <div class="d-flex align-items-center justify-content-between gap-2 flex-wrap">
    <div>
      <h1 class="h4 m-0">Admin • Audit Log</h1>
      <div class="small text-muted">
        Rekod keselamatan untuk item yang diedit atau dipadam.
      </div>
    </div>

    <button class="btn btn-outline-secondary" id="btnLoad" type="button">Refresh</button>
  </div>

  <div class="card mt-3">
    <div class="card-body">
      <div class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label">Action</label>
          <select id="filterAction" class="form-select">
            <option value="ALL">Semua</option>
            <option value="EDIT">EDIT</option>
            <option value="DELETE">DELETE</option>
            <option value="UPDATE">UPDATE</option>
            <option value="CANCEL">CANCEL</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Table</label>
          <input id="filterTable" class="form-control" value="j916_items" placeholder="contoh: j916_items">
        </div>

        <div class="col-md-4">
          <label class="form-label">Cari</label>
          <input id="searchBox" class="form-control" placeholder="code / admin / sebab / record id">
        </div>

        <div class="col-md-2">
          <label class="form-label">Limit</label>
          <select id="limitPick" class="form-select">
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="300">300</option>
            <option value="500">500</option>
          </select>
        </div>
      </div>

      <div class="small-note mt-2" id="resultInfo">Belum load.</div>
    </div>
  </div>

  <div class="table-responsive mt-3">
    <table class="table table-sm align-middle table-sticky">
      <thead>
        <tr>
          <th style="width:150px">Tarikh</th>
          <th style="width:90px">Action</th>
          <th>Table</th>
          <th>Record</th>
          <th>Sebab</th>
          <th>Admin</th>
          <th class="text-end" style="width:110px">Detail</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7" class="text-muted py-4">Memuatkan…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Audit Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Tutup"></button>
      </div>
      <div class="modal-body">
        <div class="mb-2 small text-muted" id="detailInfo">-</div>

        <div class="row g-3">
          <div class="col-md-6">
            <div class="fw-bold mb-1">Before Data</div>
            <pre id="beforeBox">-</pre>
          </div>
          <div class="col-md-6">
            <div class="fw-bold mb-1">After Data</div>
            <pre id="afterBox">-</pre>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-light" data-bs-dismiss="modal">Tutup</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const SB_URL = "https://dduizetstqqjrpsezbpi.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkdWl6ZXRzdHFxanJwc2V6YnBpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg3MzI0ODQsImV4cCI6MjA3NDMwODQ4NH0.CrlHXrmHtKgR9qc2192U6quRb5lpFEeOSgwG0Lb8KRM";

window.sb = window.sb || window.supabase.createClient(SB_URL, SB_KEY);
const sb = window.sb;

const $ = id => document.getElementById(id);
let AUDIT_ROWS = [];

function safeStr(x){
  return x === null || x === undefined ? '' : String(x);
}

function escapeHtml(s){
  return safeStr(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

function fmtDT(x){
  if(!x) return '-';
  try{
    return new Date(x).toLocaleString('ms-MY',{hour12:false});
  }catch(_){
    return safeStr(x);
  }
}

function shortId(x){
  const s = safeStr(x);
  if(!s) return '-';
  if(s.length <= 20) return s;
  return s.slice(0,8) + '...' + s.slice(-6);
}

function prettyJson(x){
  if(!x) return '-';
  try{
    return JSON.stringify(x, null, 2);
  }catch(_){
    return String(x);
  }
}

function actionBadgeClass(action){
  const a = safeStr(action).toUpperCase();
  if(a === 'DELETE') return 'bg-danger';
  if(a === 'EDIT') return 'bg-warning text-dark';
  if(a === 'UPDATE') return 'bg-info text-dark';
  if(a === 'CANCEL') return 'bg-secondary';
  return 'bg-dark';
}

(function initTopbar(){
  const pill = $('authStatus');
  const login = $('btnLogin');
  const logout = $('btnLogout');

  try{
    const a = (window.auth_get && window.auth_get()) || null;

    if(a){
      pill.textContent = 'Log masuk (admin) — ' + (a.name || a.phone || a.msisdn || 'admin');
      login.style.display = 'none';
      logout.style.display = '';
      logout.onclick = () => {
        window.auth_clear && window.auth_clear();
        location.href = 'login.html#login';
      };
    }else{
      pill.textContent = 'Tidak log masuk';
      login.style.display = '';
      logout.style.display = 'none';
      login.onclick = () => location.href = 'login.html#login';
    }
  }catch(_){}
})();

async function requireAdmin(){
  if(window.adminGuard && typeof adminGuard.require === 'function'){
    return await adminGuard.require({
      onChecking:()=> $('authStatus').textContent = 'Mengesahkan akses…',
      onDenied:()=> $('authStatus').textContent = 'Akses ditolak',
      onAllowed:(p)=> $('authStatus').textContent = 'Log masuk (admin) — ' + p
    });
  }

  const a = (window.auth_get && window.auth_get()) || null;
  if(!a){
    location.href = 'login.html#login';
    return false;
  }

  return true;
}

async function loadAuditLogs(){
  const btn = $('btnLoad');
  btn.disabled = true;
  btn.textContent = 'Loading…';

  try{
    const action = $('filterAction').value;
    const tableName = $('filterTable').value.trim();
    const q = $('searchBox').value.trim();
    const limit = Number($('limitPick').value || 100);

    let query = sb
      .from('admin_audit_logs')
      .select('*')
      .order('created_at', { ascending:false })
      .limit(limit);

    if(action && action !== 'ALL'){
      query = query.eq('action', action);
    }

    if(tableName){
      query = query.ilike('table_name', `%${tableName}%`);
    }

    if(q){
      const like = `%${q}%`;
      query = query.or([
        `record_id.ilike.${like}`,
        `record_code.ilike.${like}`,
        `reason.ilike.${like}`,
        `admin_phone.ilike.${like}`,
        `admin_name.ilike.${like}`
      ].join(','));
    }

    const { data, error } = await query;
    if(error) throw error;

    AUDIT_ROWS = Array.isArray(data) ? data : [];
    renderRows(AUDIT_ROWS);

  }catch(e){
    console.error(e);
    $('tbody').innerHTML = `<tr><td colspan="7" class="text-danger py-4">Ralat load audit log: ${escapeHtml(e?.message || e)}</td></tr>`;
    $('resultInfo').textContent = 'Ralat.';
  }finally{
    btn.disabled = false;
    btn.textContent = 'Refresh';
  }
}

function renderRows(rows){
  if(!rows.length){
    $('tbody').innerHTML = `<tr><td colspan="7" class="text-muted py-4">Tiada log.</td></tr>`;
    $('resultInfo').textContent = '0 log.';
    return;
  }

  $('tbody').innerHTML = rows.map((r, idx)=>{
    const action = safeStr(r.action).toUpperCase();
    const code = r.record_code || '-';

    return `
      <tr>
        <td>${fmtDT(r.created_at)}</td>
        <td><span class="badge ${actionBadgeClass(action)}">${escapeHtml(action)}</span></td>
        <td class="mono">${escapeHtml(r.table_name || '-')}</td>
        <td>
          <div class="mono fw-semibold">${escapeHtml(code)}</div>
          <div class="small text-muted mono">${escapeHtml(shortId(r.record_id))}</div>
        </td>
        <td>${escapeHtml(r.reason || '-')}</td>
        <td>
          <div>${escapeHtml(r.admin_name || '-')}</div>
          <div class="small text-muted mono">${escapeHtml(r.admin_phone || '-')}</div>
        </td>
        <td class="text-end">
          <button class="btn btn-outline-dark btn-sm" type="button" onclick="openDetail(${idx})">
            Detail
          </button>
        </td>
      </tr>
    `;
  }).join('');

  $('resultInfo').textContent = `${rows.length} log dipaparkan.`;
}

window.openDetail = function(idx){
  const r = AUDIT_ROWS[idx];
  if(!r) return;

  $('detailInfo').textContent =
    `${fmtDT(r.created_at)} • ${safeStr(r.action).toUpperCase()} • ${r.record_code || '-'} • ${r.reason || '-'}`;

  $('beforeBox').textContent = prettyJson(r.before_data);
  $('afterBox').textContent = prettyJson(r.after_data);

  new bootstrap.Modal($('detailModal')).show();
};

$('btnLoad').addEventListener('click', loadAuditLogs);
$('filterAction').addEventListener('change', loadAuditLogs);
$('limitPick').addEventListener('change', loadAuditLogs);

$('filterTable').addEventListener('input', ()=>{
  clearTimeout(window.__tblTimer);
  window.__tblTimer = setTimeout(loadAuditLogs, 400);
});

$('searchBox').addEventListener('input', ()=>{
  clearTimeout(window.__qTimer);
  window.__qTimer = setTimeout(loadAuditLogs, 400);
});

(async ()=>{
  const ok = await requireAdmin();
  if(!ok) return;
  await loadAuditLogs();
})();
</script>
</body>
</html>
