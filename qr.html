<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR — Emas Amir</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- QR code lib -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <style>
    body { background:#fff; }
    .wrap { max-width: 820px; margin: 24px auto; }
    .logo { height: 64px; object-fit: contain; }
    .qr-box{
      width: 300px; height: 300px; border:1px dashed #e0e0e0; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
    }
    .btn-main{ background:#be1e2d; border-color:#be1e2d; }
    .btn-main:hover{ background:#9f1a26; border-color:#9f1a26; }
    .kv .label{color:#6c757d; font-size:.9rem;}
    .kv .value{ font-weight:600; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="d-flex align-items-center gap-3 mb-3">
      <img src="logo-emas-amir.png" alt="Emas Amir" class="logo">
      <div>
        <h4 class="m-0">Emas Amir</h4>
        <div class="text-muted">Premium Trusted Since 2016</div>
      </div>
      <div class="ms-auto">
        <button class="btn btn-outline-secondary btn-sm" onclick="history.back()">Kembali</button>
      </div>
    </header>

    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="fw-bold mb-3">Maklumat Pesanan</h5>

        <div class="row kv g-3">
          <div class="col-12 col-md-6">
            <div class="label">Produk</div>
            <div id="v-produk" class="value">-</div>
          </div>
          <div class="col-6 col-md-3">
            <div class="label">Harga (RM)</div>
            <div id="v-harga" class="value">-</div>
          </div>
          <div class="col-6 col-md-3">
            <div class="label">Upah/Pos (RM)</div>
            <div id="v-upah" class="value">-</div>
          </div>

          <div class="col-12 col-md-6">
            <div class="label">SKU</div>
            <div id="v-sku" class="value">-</div>
          </div>
          <div class="col-6 col-md-3">
            <div class="label">Jumlah (RM)</div>
            <div id="v-jumlah" class="value">-</div>
          </div>
          <div class="col-6 col-md-3">
            <div class="label">4 Digit No. Tel</div>
            <div id="v-last4" class="value">-</div>
          </div>

          <div class="col-12">
            <div class="label">Ref (Rujukan)</div>
            <div id="v-ref" class="value">-</div>
          </div>
        </div>

        <hr class="my-4">

        <div class="d-flex flex-wrap align-items-start gap-4">
          <div class="qr-box" id="qr"></div>

          <div class="flex-grow-1">
            <p class="mb-2 text-muted">
              Imbas QR ini untuk buka halaman ini pada peranti lain / kongsi dengan pelanggan.
            </p>
            <div class="d-flex flex-wrap gap-2">
              <button id="btnCopy" class="btn btn-outline-secondary">Salin Pautan</button>
              <button class="btn btn-outline-secondary" onclick="window.print()">Cetak</button>
              <a id="btnOpen" class="btn btn-main" target="_blank" rel="noopener">Buka dalam Tab Baru</a>
            </div>
            <div class="mt-3 small text-muted" id="urlText"></div>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center text-muted small mt-3">
      © Emas Amir
    </footer>
  </div>

  <script>
    // Ambil data dari query string
    const params = new URLSearchParams(location.search);
    const get = k => (params.get(k) || '').trim();

    const data = {
      produk: get('produk'),
      harga:  get('harga'),
      sku:    get('sku'),
      upah:   get('upah'),
      jumlah: get('jumlah'),
      last4:  get('last4'),
      ref:    get('ref')
    };

    // Papar
    const setText = (id, val) => document.getElementById(id).innerText = val || '-';
    setText('v-produk', data.produk);
    setText('v-harga',  data.harga);
    setText('v-upah',   data.upah);
    setText('v-sku',    data.sku);
    setText('v-jumlah', data.jumlah);
    setText('v-last4',  data.last4);
    setText('v-ref',    data.ref);

    // Bina URL sendiri (normalize) – supaya QR sentiasa tepat
    const url = `${location.origin}${location.pathname}?${params.toString()}`;

    // QR utk link halaman ini
    new QRCode(document.getElementById('qr'), { text: url, width: 290, height: 290 });

    // Salin & Buka
    document.getElementById('btnCopy').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(url);
        document.getElementById('btnCopy').innerText = 'Disalin!';
        setTimeout(()=> document.getElementById('btnCopy').innerText='Salin Pautan', 1500);
      } catch(e){ alert('Gagal salin: ' + e.message); }
    });
    document.getElementById('btnOpen').href = url;
    document.getElementById('urlText').innerText = url;
  </script>
</body>
</html>
