<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin • Cert PSD 36 (300dpi)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js?v=13.1"></script>
  <script src="admin-guard.js?v=1"></script>
  <style>
    body{background:#f6f7f9}
    .wrap{max-width:980px;margin:18px auto;padding:12px}
    .box{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:14px}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
    .small{font-size:12px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="d-flex align-items-center justify-content-between mb-2">
    <h4 class="m-0">Cert PSD 36 (Front) • 300dpi</h4>
    <div class="small text-muted">Sistem susun + save PSD. Staff buat W1 manual dalam Photoshop.</div>
  </div>

  <div class="box mb-3">
    <div class="row g-2 align-items-end">
      <div class="col-md-6">
        <label class="form-label">Upload gambar (1–36)</label>
        <input id="file" type="file" class="form-control" accept="image/*" multiple />
        <div class="small text-muted mt-1">Tip: pilih banyak terus (Ctrl/Shift).</div>
      </div>

      <div class="col-md-3">
        <label class="form-label">Bucket Upload</label>
        <input id="bucket" class="form-control" value="cert_uploads">
        <div class="small text-muted mt-1">Contoh: cert_uploads</div>
      </div>

      <div class="col-md-3">
        <button id="btnUpload" class="btn btn-primary w-100">1) Upload ke Supabase</button>
      </div>
    </div>
  </div>

  <div class="box mb-3">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div>
        <b>Senarai (akan ikut susunan upload)</b>
        <div class="small text-muted">Slot_01 sampai Slot_36</div>
      </div>
      <button id="btnGenerate" class="btn btn-success" disabled>2) Generate PSD</button>
    </div>

    <div id="list" class="mono small"></div>
    <div id="status" class="mt-2 small text-muted"></div>
  </div>

  <div class="box">
    <b>Output</b>
    <div id="out" class="small mt-2"></div>
  </div>
</div>

<script>
  // Supabase init (guna pattern projek Amir)
  const SUPABASE_URL = window.SUPABASE_URL || localStorage.getItem("SUPABASE_URL");
  const SUPABASE_ANON = window.SUPABASE_ANON_KEY || localStorage.getItem("SUPABASE_ANON_KEY");

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const elFile = document.getElementById("file");
  const elBucket = document.getElementById("bucket");
  const elList = document.getElementById("list");
  const elStatus = document.getElementById("status");
  const elOut = document.getElementById("out");
  const btnUpload = document.getElementById("btnUpload");
  const btnGenerate = document.getElementById("btnGenerate");

  let uploadedPaths = []; // ["bucket/path/file.jpg", ...]

  function setStatus(msg){ elStatus.textContent = msg || ""; }
  function renderList(){
    if (!uploadedPaths.length){
      elList.textContent = "(belum ada)";
      btnGenerate.disabled = true;
      return;
    }
    btnGenerate.disabled = false;
    elList.innerHTML = uploadedPaths.map((p, i)=>`${String(i+1).padStart(2,"0")}. ${p}`).join("<br>");
  }

  async function ensureAuth(){
    // ikut auth.js Amir - biasanya token sudah ada
    const { data } = await sb.auth.getSession();
    if (!data.session) throw new Error("Belum login / session tiada");
  }

  btnUpload.addEventListener("click", async () => {
    try {
      await ensureAuth();
      const files = Array.from(elFile.files || []);
      if (!files.length) return alert("Pilih gambar dulu");
      if (files.length > 36) return alert("Max 36 gambar");

      const bucket = (elBucket.value || "").trim();
      if (!bucket) return alert("Bucket kosong");

      setStatus("Uploading...");
      uploadedPaths = [];

      const jobId = `job_${Date.now()}`;
      for (let i=0;i<files.length;i++){
        const f = files[i];
        const ext = (f.name.split(".").pop() || "jpg").toLowerCase();
        const safeExt = ["jpg","jpeg","png","webp"].includes(ext) ? ext : "jpg";
        const path = `front/${jobId}/${String(i+1).padStart(2,"0")}.${safeExt}`;

        const { error } = await sb.storage.from(bucket).upload(path, f, { upsert: true });
        if (error) throw error;

        uploadedPaths.push(`${bucket}/${path}`);
        setStatus(`Uploaded ${i+1}/${files.length}`);
      }

      renderList();
      setStatus(`Siap upload: ${files.length} gambar. Tekan "Generate PSD".`);
    } catch (e) {
      console.error(e);
      alert(e.message || String(e));
      setStatus("");
    }
  });

  btnGenerate.addEventListener("click", async () => {
    try {
      await ensureAuth();
      if (!uploadedPaths.length) return alert("Tiada gambar");

      setStatus("Generating PSD...");
      elOut.innerHTML = "";

      const payload = {
        job_id: `psd_${Date.now()}`,
        images: uploadedPaths.map(p => ({ path: p })),
        config: {
          canvasW: 4724,
          canvasH: 6850,
          cols: 6,
          rows: 6,
          slotW: 650,
          slotH: 1028,
          marginX: 180,
          marginY: 180,
          gapX: 24,
          gapY: 24,
          includeGrid: true,
          outputBucket: "cert_outputs"
        }
      };

      const res = await fetch("/.netlify/functions/cert-psd-generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Generate failed");

      setStatus("Siap. Download PSD & buka dalam Photoshop (buat W1 manual).");

      elOut.innerHTML = `
        <div>✅ <b>PSD siap</b></div>
        <div class="mono small mt-1">${data.output.bucket}/${data.output.path}</div>
        <div class="mt-2"><a class="btn btn-outline-primary btn-sm" href="${data.output.signed_url}" target="_blank" rel="noopener">Download PSD</a></div>
        <div class="small text-muted mt-2">Lepas buka PSD: merge kalau perlu → Ctrl+klik layer → Channels → New Spot Channel (W1) → Save as TIFF.</div>
      `;
    } catch (e) {
      console.error(e);
      alert(e.message || String(e));
      setStatus("");
    }
  });

  renderList();
</script>
</body>
</html>
