<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sahkan Order – Admin Emas Amir</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body{background:#f9fafb;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .container-narrow{max-width:760px;margin:auto;padding:20px}
  .card{background:#fff;border:1px solid #eee;border-radius:12px;padding:20px;margin-top:20px}
  h1{font-size:22px;margin-bottom:20px}
  .label{font-weight:600}
  .status-badge{display:inline-block;padding:6px 12px;border-radius:8px;font-size:14px}
  .status-PENDING{background:#fff3cd;color:#856404;border:1px solid #ffeeba}
  .status-PAID{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
  .status-CANCEL{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
  .actions{margin-top:20px;display:flex;gap:10px}
</style>
</head>
<body>
<div class="container-narrow">
  <div class="card">
    <h1>Sahkan Order</h1>
    <div id="orderBox">Memuatkan...</div>
    <div class="actions">
      <button id="btnApprove" class="btn btn-success">✅ Sahkan</button>
      <button id="btnCancel" class="btn btn-danger">❌ Batal</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

// ====== Konfigurasi Supabase (guna anon public key sahaja di FE) ======
const SB_URL = "https://dduizetstqqjrpsezbpi.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // 👉 ganti dengan anon/public key
const sb = createClient(SB_URL, SB_KEY);

// ====== Helper ======
const $ = (id)=>document.getElementById(id);
const params = new URLSearchParams(location.search);
const ref = params.get("ref");

if(!ref){ $("orderBox").innerHTML = "<div class='alert alert-danger'>Rujukan order tidak sah.</div>"; throw new Error("No ref"); }

// ====== Load order ======
async function loadOrder(){
  const { data, error } = await sb.from("orders").select("*").eq("ref", ref).single();
  if(error || !data){
    $("orderBox").innerHTML = "<div class='alert alert-danger'>Order tidak dijumpai.</div>";
    return;
  }

  $("orderBox").innerHTML = `
    <p><span class="label">Ref:</span> ${data.ref}</p>
    <p><span class="label">Produk:</span> ${data.product_name}</p>
    <p><span class="label">Jumlah:</span> RM ${Number(data.total).toFixed(2)}</p>
    <p><span class="label">Nama Pelanggan:</span> ${data.customer_name || "-"}</p>
    <p><span class="label">Telefon:</span> ${data.customer_phone || "-"}</p>
    <p><span class="label">Alamat:</span> ${data.alamat || "-"}</p>
    <p><span class="label">Status Semasa:</span> 
      <span class="status-badge status-${data.status||'PENDING'}">${data.status||'PENDING'}</span>
    </p>
  `;
}

// ====== Update status ======
async function updateStatus(newStatus){
  const { error } = await sb.from("orders").update({ status:newStatus }).eq("ref", ref);
  if(error){ alert("❌ Gagal kemaskini: " + error.message); return; }
  alert("✅ Status ditukar ke: " + newStatus);
  loadOrder();
}

$("btnApprove").onclick = ()=>updateStatus("PAID");
$("btnCancel").onclick  = ()=>updateStatus("CANCEL");

// init
loadOrder();
</script>
</body>
</html>
