<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FPX Payment Result • Emas Amir</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f6f7fb;margin:0;padding:30px;color:#111}
    .box{max-width:720px;margin:auto;background:#fff;padding:24px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h1{margin-top:0;background:#2f73c8;color:#fff;padding:14px;border-radius:10px;text-align:center}
    .row{display:grid;grid-template-columns:220px 1fr;gap:10px;padding:9px 0;border-bottom:1px solid #eee}
    .label{font-weight:700}
    .success{color:#15803d;font-weight:900}
    .fail{color:#dc2626;font-weight:900}
  </style>
</head>
<body>
<div class="box">
  <h1>RECEIPT PAGE</h1>

  <div class="row"><div class="label">Transaction Status</div><div id="status">-</div></div>
  <div class="row"><div class="label">FPX Transaction ID</div><div id="txnId">-</div></div>
  <div class="row"><div class="label">Seller Order Number</div><div id="orderNo">-</div></div>
  <div class="row"><div class="label">Transaction Date & Time</div><div id="txnTime">-</div></div>
  <div class="row"><div class="label">Buyer Bank</div><div id="bank">-</div></div>
  <div class="row"><div class="label">Transaction Amount</div><div id="amount">-</div></div>
  <div class="row"><div class="label">Debit Auth Code</div><div id="debit">-</div></div>

  <p style="margin-top:20px">
    <a href="/fpx/checkout.html">Back to FPX Checkout</a>
  </p>
</div>

<script>
  const p = new URLSearchParams(location.search);

  function get(name, fallback="-"){
    return p.get(name) || fallback;
  }

  const debit = get("fpx_debitAuthCode", get("debit", "-"));

  let statusText = "UNSUCCESSFUL";
  if(debit === "00") statusText = "SUCCESSFUL";
  if(debit === "99") statusText = "PENDING AUTHORIZATION";

  document.getElementById("status").textContent = statusText;
  document.getElementById("status").className = debit === "00" ? "success" : "fail";

  document.getElementById("txnId").textContent = get("fpx_fpxTxnId", get("txnId"));
  document.getElementById("orderNo").textContent = get("fpx_sellerOrderNo", get("orderNo"));
  document.getElementById("txnTime").textContent = get("fpx_fpxTxnTime", get("txnTime"));
  document.getElementById("bank").textContent = get("fpx_buyerBankId", get("bank"));
  document.getElementById("amount").textContent = "RM " + get("fpx_txnAmount", get("amount", "0.00"));
  document.getElementById("debit").textContent = debit;
</script>
</body>
</html>
