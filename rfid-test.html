<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <title>RFID Test • Emas Amir</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <style>
    body{
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:#f8fafc;
      margin:0;
      padding:16px;
    }
    .card{
      max-width:480px;
      margin:0 auto;
      background:#fff;
      border-radius:12px;
      padding:16px 18px 18px;
      box-shadow:0 1px 3px rgba(15,23,42,.12);
    }
    h1{
      font-size:20px;
      margin:0 0 8px;
    }
    p{
      margin:4px 0;
      font-size:14px;
      color:#475569;
    }
    .input-wrap{
      margin-top:12px;
    }
    input[type="text"]{
      width:100%;
      padding:10px 12px;
      border-radius:8px;
      border:1px solid #cbd5f5;
      font-size:16px;
    }
    .epc-box{
      margin-top:14px;
      padding:10px 12px;
      border-radius:8px;
      background:#0f172a;
      color:#e5e7eb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:13px;
      word-break:break-all;
    }
    .small{
      font-size:12px;
      color:#64748b;
      margin-top:6px;
    }
    ul{
      margin:8px 0 0;
      padding-left:18px;
      font-size:12px;
      color:#64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ujian RFID Reader</h1>
    <p>Letak cursor dalam kotak bawah, kemudian tekan butang scan pada handheld dan dekatkan pada tag.</p>
    <div class="input-wrap">
      <input id="rfidInput" type="text" autocomplete="off" autofocus placeholder="Scan di sini…" />
    </div>
    <div id="epcBox" class="epc-box" style="display:none;"></div>
    <p class="small">
      Tip:
      <ul>
        <li>Reader akan hantar aksara seperti keyboard.</li>
        <li>Kita anggap setiap scan diakhiri dengan ENTER.</li>
      </ul>
    </p>
  </div>

  <script>
    const input = document.getElementById("rfidInput");
    const box   = document.getElementById("epcBox");

    // Sentiasa cuba kekalkan fokus dalam input
    function keepFocus(){
      if (document.activeElement !== input){
        input.focus();
      }
    }
    setInterval(keepFocus, 1000);

    // Bila tekan Enter, kita anggap satu scan selesai
    input.addEventListener("keydown", (ev)=>{
      if (ev.key === "Enter"){
        ev.preventDefault();
        const value = input.value.trim();
        if (!value) return;

        const epc = value;
        box.style.display = "block";
        box.textContent = "Last EPC: " + epc;

        // TODO kemudian: call Supabase untuk cari item ikut EPC
        // buat masa ni kita hanya paparkan sahaja

        input.value = "";
      }
    });
  </script>
</body>
</html>
