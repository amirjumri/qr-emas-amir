<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Test Kamera Native</title>
  <style>
    video { width: 100%; max-width: 400px; border: 2px solid #ccc; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>Test Kamera Native</h2>
  <video id="preview" autoplay playsinline></video>
  <pre id="log">Menunggu...</pre>

  <script>
    const video = document.getElementById("preview");
    const log = (msg) => document.getElementById("log").textContent += "\n" + msg;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(stream => {
        video.srcObject = stream;
        log("Kamera belakang aktif ✅");
      })
      .catch(err => {
        log("Ralat akses kamera: " + err);
      });
  </script>
</body>
</html>
