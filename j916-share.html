  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#f6f7f9;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:#111827;
      padding:20px;
    }
    .card{
      width:100%;
      max-width:420px;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:22px;
      padding:22px;
      text-align:center;
      box-shadow:0 18px 45px rgba(15,23,42,.12);
    }
    .logo{
      width:74px;
      height:74px;
      border-radius:22px;
      object-fit:cover;
      margin-bottom:12px;
    }
    .title{
      font-weight:900;
      font-size:22px;
      margin-bottom:6px;
    }
    .text{
      color:#6b7280;
      font-size:14px;
      margin-bottom:16px;
    }
    .btn{
      display:inline-block;
      padding:12px 18px;
      border-radius:999px;
      background:#111827;
      color:#fff;
      text-decoration:none;
      font-weight:800;
    }
  </style>
</head>

<body>
  <div class="card">
    <img class="logo" src="/icons/icon-512.png" alt="Emas Amir">
    <div class="title">Barang Kemas 916</div>
    <div class="text">Sedang buka barang pilihan di Emas Amir…</div>
    <a id="openBtn" class="btn" href="/j916.html">Buka Sekarang</a>
  </div>

<script>
(function(){
  const q = new URLSearchParams(location.search);

  const design = q.get("design") || "";
  const product = q.get("product") || q.get("id") || "";

  let target = "/j916.html";

  if (product) {
    target += "?product=" + encodeURIComponent(product);
  } else if (design) {
    target += "?design=" + encodeURIComponent(design);
  }

  const btn = document.getElementById("openBtn");
  if (btn) btn.href = target;

  setTimeout(()=>{
    location.replace(target);
  }, 650);
})();
</script>
</body>
