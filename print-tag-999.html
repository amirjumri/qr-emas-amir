<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <title>Cetak Tag 999</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

  <style>
    @page {
      size: 67mm 27mm;
      margin: 0;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      padding:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

   .tag-page{
  width:67mm;
  height:27mm;
  padding:2mm 2mm 1.5mm 2mm;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

.tag-top{
  height:11mm; /* sikit kecil bagi ruang barcode */
  padding-left:1.2mm;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  font-size:7.4pt;
  line-height:1.02;
  white-space:nowrap;
  margin-top:-0.6mm;
}

.tag-top .title{
  font-weight:800;
  margin-bottom:0.2mm;
  font-size:8pt;
}

.line-1{
  font-weight:700;
  font-size:7.6pt;
}

.line-2{
  font-weight:700;
  font-size:7.6pt;
  margin-top:0.05mm;
}
.tag-bottom{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  margin-top:1.2mm;
  padding-left:2.2mm;
  
}

.barcode{
  margin-top:1.4mm;
  margin-left:0;
  display:block;
}

.code-text{
  font-size:8.8pt;
  font-weight:800;
  margin-top:0.4mm;
  width:24mm;
  text-align:center;
  letter-spacing:0.04em;
  margin-left:0;
}
    @media screen {
      body{
        background:#eee;
        padding:10px;
        display:flex;
        flex-wrap:wrap;
        gap:6px;
      }
      .tag-page{
        background:#fff;
        border:1px solid #ccc;
      }
    }

    @media print {
      body{
        margin:0;
        padding:0;
        background:transparent;
        display:block;
      }

      .tag-page{
        break-after: page;
        page-break-after: always;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .tag-page:last-child{
        break-after: auto;
        page-break-after: auto;
      }
    }
  </style>
</head>
<body>
<script>
  const SB_URL = "https://dduizetstqqjrpsezbpi.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkdWl6ZXRzdHFxanJwc2V6YnBpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg3MzI0ODQsImV4cCI6MjA3NDMwODQ4NH0.CrlHXrmHtKgR9qc2192U6quRb5lpFEeOSgwG0Lb8KRM";
  const sb = window.supabase.createClient(SB_URL, SB_KEY);

  function fmt3(x){
    return Number(x || 0).toFixed(3);
  }

  function esc(s){
    return String(s || '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function getKindLabel(kind){
    const k = String(kind || '').toLowerCase();
    if (k === 'goldbar') return 'GOLD BAR';
    if (k === 'coin') return 'GOLD COIN';
    if (k === 'dinar') return 'DINAR';
    return (kind || '-').toUpperCase();
  }

  function renderTags(items){
    document.body.innerHTML = "";

    items.forEach((it, idx)=>{
      const div = document.createElement("div");
      div.className = "tag-page";

      const kindLabel = getKindLabel(it.item_kind);
      const groupName = it.group_name || '-';
      const weight = fmt3(it.after_kikis_g ?? it.before_kikis_g ?? it.target_weight_g ?? 0);
      const barcode = it.barcode_value || '';

      div.innerHTML = `
        <div class="tag-top">
  <div class="title">999.9 EMAS AMIR</div>
  <div class="line-1">J:${esc(kindLabel)}</div>
  <div class="line-2">G:${esc(groupName)}</div>
  <div class="line-2">W:${esc(weight)}gm</div>
</div>

<div class="tag-bottom">
  <svg id="bc-${idx}" class="barcode"></svg>
  <div class="code-text">${esc(barcode)}</div>
</div>
      `;

      document.body.appendChild(div);

      try{
        JsBarcode(`#bc-${idx}`, String(barcode || ""), {
  format: "CODE128",
  displayValue: false,
  margin: 2,
  height: 18,
  width: 1.0
});
      }catch(e){
        console.error("Barcode error", e);
      }
    });

    setTimeout(()=>window.print(), 300);
  }

  (async function main(){
    const params = new URLSearchParams(window.location.search);
    const codesStr = params.get("codes") || "";
    const codes = codesStr.split(",").map(c=>c.trim()).filter(Boolean);

    if (!codes.length){
      alert("Tiada barcode.");
      return;
    }

    try{
      const { data, error } = await sb
        .from('gold999_pieces')
        .select('barcode_value,item_kind,group_name,target_weight_g,before_kikis_g,after_kikis_g')
        .in('barcode_value', codes);

      if (error) throw error;

      const rows = Array.isArray(data) ? data : [];
      if (!rows.length){
        alert("Tiada data piece 999.");
        return;
      }

      const order = new Map(codes.map((c,i)=>[c.toUpperCase(), i]));
      rows.sort((a,b)=>{
        return (order.get(String(a.barcode_value || '').toUpperCase()) ?? 9999) -
               (order.get(String(b.barcode_value || '').toUpperCase()) ?? 9999);
      });

      renderTags(rows);

    }catch(e){
      alert("Gagal dapatkan data: " + (e?.message || e));
      console.error(e);
    }
  })();
</script>
</body>
</html>...
